<title>Ambassia — Carte des campus français</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0F4FA;
  --white:#FFFFFF;
  --s1:#E8EDF7;
  --ink:#0A1740;
  --ink2:#3A4870;
  --ink3:#8A95B8;
  --border:#DDE2EF;
  --blue:#1A6BFF;
  --blue-l:#EEF3FF;
  --blue-m:#C5D5FF;
  --green:#0A9E6A;
  --green-l:#E6F7F1;
  --purple:#7B4FE0;
  --purple-l:#F0EBFF;
  --orange:#E85C1A;
  --orange-l:#FEF0E8;
  --amber:#C47B00;
  --amber-l:#FEF5E0;
}
html,body{height:100%;font-size:14px;overflow:hidden;}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;}

/* HEADER */
header{
  height:58px;background:var(--white);border-bottom:1px solid var(--border);
  padding:0 28px;display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:1000;flex-shrink:0;
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--ink);}
.logo em{font-style:normal;color:var(--blue);}
.h-center{display:flex;align-items:center;gap:10px;}
.h-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--ink2);}
.h-badge{font-size:11px;font-weight:600;background:var(--blue-l);border:1px solid var(--blue-m);border-radius:20px;padding:3px 12px;color:var(--blue);}
.h-cta{
  padding:9px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;
  text-decoration:none;display:inline-block;transition:background .15s;
}
.h-cta:hover{background:#1558DD;}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 58px);}

/* SIDEBAR */
.sidebar{
  width:320px;flex-shrink:0;background:var(--white);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-top{padding:14px 16px;border-bottom:1px solid var(--border);}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:13px;}
.search-inp{
  width:100%;padding:9px 12px 9px 34px;
  background:var(--s1);border:1px solid var(--border);border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;
}
.search-inp:focus{border-color:var(--blue);background:var(--white);}
.search-inp::placeholder{color:var(--ink3);}

/* FILTERS */
.filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.fbtn{
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
  border:1.5px solid var(--border);background:var(--white);color:var(--ink3);
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;
}
.fbtn:hover{border-color:var(--ink3);color:var(--ink);}
.fbtn.on{color:#fff;border-color:transparent;}
.fbtn[data-t="all"].on{background:var(--blue);}
.fbtn[data-t="universite"].on{background:var(--blue);}
.fbtn[data-t="ecole_commerce"].on{background:var(--purple);}
.fbtn[data-t="ecole_ingenieur"].on{background:var(--green);}
.fbtn[data-t="iep"].on{background:var(--orange);}
.fbtn[data-t="autre"].on{background:var(--amber);}

/* STATS */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.stat{background:var(--s1);border-radius:8px;padding:8px 10px;text-align:center;}
.stat-n{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.3px;}
.stat-l{font-size:10px;color:var(--ink3);margin-top:1px;}

/* LIST */
.sb-list{flex:1;overflow-y:auto;padding:8px;}
.sb-list::-webkit-scrollbar{width:3px;}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.ci{
  padding:10px 12px;border-radius:10px;margin-bottom:5px;
  cursor:pointer;border:1.5px solid transparent;
  background:var(--s1);transition:all .15s;
}
.ci:hover{background:var(--blue-l);border-color:var(--blue-m);}
.ci.on{background:var(--blue-l);border-color:var(--blue);}
.ci-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:3px;}
.ci-nom{font-size:12px;font-weight:500;color:var(--ink);line-height:1.3;}
.ci-type{font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;flex-shrink:0;}
.t-universite{background:var(--blue-l);color:var(--blue);}
.t-ecole_commerce{background:var(--purple-l);color:var(--purple);}
.t-ecole_ingenieur{background:var(--green-l);color:var(--green);}
.t-iep{background:var(--orange-l);color:var(--orange);}
.t-autre{background:var(--amber-l);color:var(--amber);}
.ci-meta{display:flex;align-items:center;gap:8px;}
.ci-ville{font-size:11px;color:var(--ink3);}
.ci-etu{font-size:11px;color:var(--ink3);}
.ci-bde{font-size:10px;color:var(--green);background:var(--green-l);border-radius:6px;padding:1px 6px;}
.no-res{text-align:center;padding:28px;color:var(--ink3);font-size:13px;}

/* MAP */
.map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}

/* POPUP styles injectés dans la page */
.ap-popup{font-family:'DM Sans',sans-serif;min-width:240px;}
.ap-header{margin-bottom:10px;}
.ap-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--ink);margin-bottom:3px;line-height:1.2;}
.ap-ville{font-size:11px;color:var(--ink3);}
.ap-chips{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.ap-chip{font-size:10px;font-weight:600;padding:3px 9px;border-radius:12px;}
.ap-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.ap-stat{background:var(--s1);border-radius:7px;padding:8px 10px;}
.ap-stat-n{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--ink);}
.ap-stat-l{font-size:10px;color:var(--ink3);margin-top:1px;}
.ap-insight{background:var(--blue-l);border:1px solid var(--blue-m);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--ink2);line-height:1.5;}
.ap-insight-loading{text-align:center;color:var(--ink3);font-size:12px;padding:8px;}
.ap-cta{
  display:block;width:100%;padding:9px;text-align:center;
  background:var(--blue);color:#fff;border:none;border-radius:8px;
  font-family:'Syne',sans-serif;font-weight:700;font-size:12px;
  cursor:pointer;text-decoration:none;
}
.ap-cta:hover{background:#1558DD;}

/* LEAFLET OVERRIDES */
.leaflet-popup-content-wrapper{border-radius:14px !important;box-shadow:0 8px 32px rgba(10,23,64,.15) !important;border:1px solid var(--border) !important;}
.leaflet-popup-content{margin:16px !important;}
.leaflet-popup-tip{box-shadow:none !important;}

/* LEGEND */
.legend{
  position:absolute;bottom:16px;left:16px;z-index:500;
  background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;box-shadow:0 2px 12px rgba(10,23,64,.08);
}
.legend-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}
.legend-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink2);margin-bottom:4px;}
.legend-row:last-child{margin-bottom:0;}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* TOTAL */
.map-total{
  position:absolute;top:12px;right:12px;z-index:500;
  background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:12px;
  padding:12px 16px;text-align:center;
  box-shadow:0 2px 12px rgba(10,23,64,.08);
}
.mt-n{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-1px;color:var(--blue);}
.mt-l{font-size:10px;color:var(--ink3);margin-top:2px;}
</style>
</head>

var filter = 'all', search = '', mapObj, mks = [], popupCache = {};

function fmtN(n) {
  if (n >= 1000) return (n/1000).toFixed(0) + 'k';
  return String(n);
}

function filtered() {
  return DATA.filter(function(c) {
    var fok = filter === 'all' || c.type === filter;
    var sok = !search || c.nom.toLowerCase().indexOf(search.toLowerCase()) >= 0 || c.ville.toLowerCase().indexOf(search.toLowerCase()) >= 0;
    return fok && sok;
  });
}

function initMap() {
  mapObj = L.map('map', { center:[46.5,2.5], zoom:6, zoomControl:false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors', maxZoom:18
  }).addTo(mapObj);
  L.control.zoom({ position:'bottomright' }).addTo(mapObj);
  render();
}

function render() {
  var list = filtered();
  var totalEtu = list.reduce(function(a,c){return a+c.etu;},0);
  var totalBde = list.filter(function(c){return c.bde;}).length;
  document.getElementById('sn1').textContent = list.length;
  document.getElementById('sn2').textContent = fmtN(totalEtu);
  document.getElementById('sn3').textContent = totalBde;
  document.getElementById('hbadge').textContent = list.length + ' campus';
  document.getElementById('mt-n').textContent = list.length;

  mks.forEach(function(m){mapObj.removeLayer(m);});
  mks = [];

  list.forEach(function(c) {
    var col = COLORS[c.type] || '#C47B00';
    var icon = L.divIcon({
      className:'',
      html:'<div style="width:12px;height:12px;border-radius:50%;background:'+col+';border:2px solid white;box-shadow:0 0 6px '+col+'80;cursor:pointer;"></div>',
      iconSize:[12,12], iconAnchor:[6,6]
    });
    var mk = L.marker([c.lat,c.lng],{icon:icon}).addTo(mapObj);
    mk.on('click', function(){openCampus(c,mk);});
    mks.push(mk);
  });

  var listEl = document.getElementById('sb-list');
  if (!list.length) { listEl.innerHTML='<div class="no-res">Aucun résultat</div>'; return; }
  listEl.innerHTML = list.map(function(c) {
    return '<div class="ci" data-id="'+c.id+'" onclick="clickItem('+c.id+')">' +
      '<div class="ci-top"><div class="ci-nom">'+c.nom+'</div>' +
      '<span class="ci-type t-'+c.type+'">'+LABELS[c.type].split(' ')[0]+'</span></div>' +
      '<div class="ci-meta"><span class="ci-ville">📍 '+c.ville+'</span>' +
      '<span class="ci-etu">👥 '+fmtN(c.etu)+'</span>' +
      (c.bde?'<span class="ci-bde">BDE</span>':'') + '</div></div>';
  }).join('');
}

function clickItem(id) {
  document.querySelectorAll('.ci').forEach(function(el){el.classList.remove('on');});
  var el = document.querySelector('[data-id="'+id+'"]');
  if (el) { el.classList.add('on'); el.scrollIntoView({block:'nearest',behavior:'smooth'}); }
  var c = DATA.find(function(x){return x.id===id;});
  if (!c) return;
  var idx = filtered().findIndex(function(x){return x.id===id;});
  mapObj.flyTo([c.lat,c.lng],13,{duration:1});
  if (idx>=0 && mks[idx]) openCampus(c,mks[idx]);
}

function openCampus(c, mk) {
  var col = COLORS[c.type]||'#C47B00';
  var insightHtml = popupCache[c.id]
    ? '<div class="ap-insight">'+popupCache[c.id]+'</div>'
    : '<div class="ap-insight-loading" id="insight-'+c.id+'">⏳ Analyse en cours...</div>';

  var popup = L.popup({maxWidth:280})
    .setLatLng([c.lat,c.lng])
    .setContent(
      '<div class="ap-popup">'+
        '<div class="ap-header"><div class="ap-name">'+c.nom+'</div><div class="ap-ville">📍 '+c.ville+'</div></div>'+
        '<div class="ap-chips">'+
          '<span class="ap-chip t-'+c.type+'" style="background:'+col+'15;color:'+col+'">'+LABELS[c.type]+'</span>'+
          (c.bde?'<span class="ap-chip" style="background:#E6F7F1;color:#0A9E6A">✓ BDE actif</span>':'<span class="ap-chip" style="background:#f0f0f0;color:#999">Pas de BDE</span>')+
        '</div>'+
        '<div class="ap-grid">'+
          '<div class="ap-stat"><div class="ap-stat-n" style="color:'+col+'">'+fmtN(c.etu)+'</div><div class="ap-stat-l">Étudiants</div></div>'+
          '<div class="ap-stat"><div class="ap-stat-n" style="color:'+col+'">'+(c.bde?'Oui':'Non')+'</div><div class="ap-stat-l">BDE</div></div>'+
        '</div>'+
        insightHtml+
        '<a class="ap-cta" href="https://calendly.com/james-porato-ambassia/30min" target="_blank">Lancer une campagne ici →</a>'+
      '</div>'
    ).openOn(mapObj);

  if (!popupCache[c.id]) fetchInsight(c);
}

function fetchInsight(c) {
  var prompt = 'Donne un insight court (2 phrases max, directes et actionnables) sur comment une marque Gen Z peut activer le campus ' + c.nom + ' a ' + c.ville + ' (' + fmtN(c.etu) + ' etudiants, type: ' + LABELS[c.type] + '). Mentionne 1 specificite de ce campus ou de cette ville pour la Gen Z. Sois concis et percutant.';

  fetch('/.netlify/functions/claude', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:120,
      messages:[{role:'user',content:prompt}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if (d.content && d.content[0]) {
      var txt = d.content[0].text;
      popupCache[c.id] = txt;
      var el = document.getElementById('insight-'+c.id);
      if (el) el.outerHTML = '<div class="ap-insight">'+txt+'</div>';
    }
  })
  .catch(function(){
    var el = document.getElementById('insight-'+c.id);
    if (el) el.style.display='none';
  });
}

document.getElementById('search').addEventListener('input', function(e){
  search = e.target.value; render();
});
document.getElementById('filters').addEventListener('click', function(e){
  var b = e.target.closest('.fbtn');
  if (!b) return;
  document.querySelectorAll('.fbtn').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on');
  filter = b.dataset.t;
  render();
});

initMap();
</script>
